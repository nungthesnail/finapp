name: api-ci

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "scripts/ci/api-test.sh"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install dependencies
        run: cd apps/api && composer install --no-interaction --prefer-dist
      - name: API smoke tests
        run: bash scripts/ci/api-test.sh
